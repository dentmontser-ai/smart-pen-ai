<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Pen | شريكك الموثوق</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap");
        @import url("https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap");
        :root { --primary-purple: #7B68EE; --dark-purple: #483D8B; --accent-gold: #FFD700; --bg-white: #FFFFFF; --text-dark: #2c3e50; --error-red: #e74c3c; --success-green: #2ecc71; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; font-family: 'Cairo', sans-serif; background-color: var(--primary-purple); }
        body { display: flex; flex-direction: column; }
        .hero-section { flex: 0 0 32%; background-color: var(--primary-purple); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; border-bottom-left-radius: 50% 30px; border-bottom-right-radius: 50% 30px; z-index: 5; }
        .logo-container svg { height: 10vh; margin-bottom: 5px; }
        .site-title { font-family: 'Dancing Script', cursive; font-size: 7vh; color: var(--accent-gold); margin: 0; line-height: 1; }
        .subtitle { font-size: 1.6vh; letter-spacing: 2px; margin: 0; opacity: 0.9; }
        .tagline { font-weight: 700; font-size: 1.8vh; color: var(--accent-gold); margin-top: 5px; }
        .main-content { flex: 1; background-color: var(--bg-white); margin-top: -20px; padding: 12px; display: flex; flex-direction: column; justify-content: space-between; border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .form-title { text-align: center; font-weight: 900; font-size: 2.2vh; margin: 5px 0 8px 0; color: var(--text-dark); }
        form { display: flex; flex-direction: column; height: 100%; justify-content: space-between; }
        .form-group { margin-bottom: 5px; }
        .email-group { margin-bottom: 5px; }
        #email { width: 100%; padding: 8px 15px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-family: 'Cairo', sans-serif; font-size: 1.6vh; outline: none; }
        #email:focus { border-color: var(--primary-purple); }
        .details-wrapper { position: relative; margin-bottom: 5px; }
        #details { width: 100%; height: 15vh; padding: 10px; padding-left: 55px; border: 1.5px solid #e0e0e0; border-radius: 15px; font-family: 'Cairo', sans-serif; font-size: 1.7vh; resize: none; outline: none; }
        #details:focus { border-color: var(--primary-purple); }
        .attachment-container { position: absolute; bottom: 8px; left: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .attachment-btn, .loader, .success-mark { position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; }
        .attachment-btn { background-color: transparent; border: none; font-size: 28px; color: var(--primary-purple); padding: 0; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary-purple); border-radius: 50%; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .success-mark { color: var(--success-green); font-size: 24px; display: none; }
        #file-input { display: none; }
        #file-status { font-size: 1.3vh; text-align: center; color: var(--primary-purple); height: 1.5vh; margin-bottom: 4px; }
        .select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background-color: var(--primary-purple); padding: 8px; border-radius: 15px; margin-bottom: 5px; }
        .full-width { grid-column: 1 / -1; }
        .custom-select { position: relative; }
        .custom-select select { width: 100%; padding: 8px 10px; border: none; border-radius: 10px; background-color: white; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 1.6vh; appearance: none; -webkit-appearance: none; outline: none; cursor: pointer; }
        .custom-select::after { content: '▼'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 1.1vh; color: var(--dark-purple); pointer-events: none; }
        .submit-area { text-align: center; padding-bottom: 10px; }
        .btn-confirm { width: 85%; max-width: 320px; height: 6.5vh; background-color: var(--primary-purple); color: white; border: none; border-radius: 50px; font-size: 2.8vh; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; box-shadow: 0 4px 15px rgba(123, 104, 238, 0.3); transition: transform 0.2s, background-color 0.3s; text-decoration: none; }
        .btn-confirm:active { transform: scale(0.95); }
        .btn-confirm.loading { background-color: var(--dark-purple); cursor: not-allowed; }
        .error-box { color: var(--error-red); font-size: 1.3vh; text-align: center; height: 1.5vh; margin-top: 4px; visibility: hidden; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: opacity 0.3s, visibility 0.3s; }
        .modal-overlay.visible { opacity: 1; visibility: visible; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; transform: scale(0.9); transition: transform 0.3s; }
        .modal-overlay.visible .modal-content { transform: scale(1); }
        .modal-title { font-size: 2.5vh; font-weight: 900; color: var(--primary-purple); margin-bottom: 15px; }
        .modal-body { font-size: 1.8vh; color: var(--text-dark); margin-bottom: 20px; line-height: 1.6; }
        .modal-close-btn { padding: 10px 25px; background: var(--primary-purple); color: white; border: none; border-radius: 25px; font-size: 1.8vh; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <header class="hero-section">
        <div class="logo-container">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M50 10L55 25H45L50 10Z" fill="#FFD700"/><circle cx="50" cy="35" r="15" stroke="#FFD700" stroke-width="3"/><path d="M45 35H55M50 30V40" stroke="#FFD700" stroke-width="2"/><path d="M35 55L50 90L65 55C65 55 60 45 50 45C40 45 35 55 35 55Z" fill="#2c3e50"/><circle cx="50" cy="65" r="3" fill="#FFD700"/><line x1="50" y1="10" x2="50" y2="5" stroke="#FFD700" stroke-width="2"/><line x1="65" y1="20" x2="70" y2="15" stroke="#FFD700" stroke-width="2"/><line x1="35" y1="20" x2="30" y2="15" stroke="#FFD700" stroke-width="2"/></svg>
        </div>
        <h1 class="site-title">Smart Pen</h1>
        <p class="subtitle">ACADEMIC SERVICES</p>
        <p class="tagline">شريكك الموثوق في رحلتك الأكاديمية</p>
    </header>
    <main class="main-content">
        <h2 class="form-title">تفاصيل الطلب الكاملة</h2>
        <form id="orderForm" onsubmit="return false;">
            <div class="form-body">
                <div class="form-group">
                    <div class="details-wrapper">
                        <textarea id="details" placeholder="الرجاء ذكر تفاصيل الطلب وعدد الصفحات أو الشرائح وطريقة التنسيق والألوان المطلوبة..."></textarea>
                        <div class="attachment-container">
                            <label for="file-input" class="attachment-btn" id="attachBtn">📎</label>
                            <div class="loader" id="fileLoader"></div>
                            <div class="success-mark" id="fileSuccess">✓</div>
                            <input type="file" id="file-input">
                        </div>
                    </div>
                    <div id="file-status"></div>
                </div>
                <div class="form-group email-group">
                    <input type="email" id="email" placeholder="بريدك الإلكتروني لاستلام الطلب" required>
                </div>
                <div class="form-group">
                    <div class="select-grid">
                        <div class="custom-select">
                            <select id="service" required>
                                <option value="" disabled selected>نوع الخدمة المطلوبة</option>
                                <option value="كتابة محتوى">كتابة محتوى</option>
                                <option value="تلخيص">تلخيص</option>
                                <option value="ترجمة">ترجمة</option>
                                <option value="إعادة صياغة">إعادة صياغة</option>
                                <option value="تدقيق لغوي">تدقيق لغوي</option>
                            </select>
                        </div>
                        <div class="custom-select">
                            <select id="lang" required>
                                <option value="" disabled selected>لغة العمل</option>
                                <option value="عربي">عربي</option>
                                <option value="إنجليزي">إنجليزي</option>
                            </select>
                        </div>
                        <div class="custom-select full-width">
                            <select id="format" required>
                                <option value="" disabled selected>نوع الملف المطلوب تسليمه</option>
                                <option value="Word (DOCX)">Word (DOCX)</option>
                                <option value="PDF">PDF</option>
                                <option value="Plain Text (TXT)">Plain Text (TXT)</option>
                            </select>
                        </div>
                    </div>
                    <div id="main-error" class="error-box">الرجاء إكمال جميع الحقول المطلوبة</div>
                </div>
            </div>
            <div class="submit-area">
                <button id="submitBtn" class="btn-confirm">تأكيد الطلب</button>
            </div>
        </form>
    </main>
    <div class="modal-overlay" id="responseModal">
        <div class="modal-content">
            <h3 id="modalTitle" class="modal-title"></h3>
            <p id="modalBody" class="modal-body"></p>
            <button id="modalCloseBtn" class="modal-close-btn">إغلاق</button>
        </div>
    </div>
    <script>
        const fileInput = document.getElementById("file-input"), attachBtn = document.getElementById("attachBtn"), fileLoader = document.getElementById("fileLoader"), fileSuccess = document.getElementById("fileSuccess"), fileStatus = document.getElementById("file-status"), mainError = document.getElementById("main-error"), serviceSelect = document.getElementById("service"), langSelect = document.getElementById("lang"), formatSelect = document.getElementById("format"), detailsInput = document.getElementById("details"), emailInput = document.getElementById("email"), submitBtn = document.getElementById("submitBtn"), orderForm = document.getElementById("orderForm"), responseModal = document.getElementById("responseModal"), modalTitle = document.getElementById("modalTitle"), modalBody = document.getElementById("modalBody"), modalCloseBtn = document.getElementById("modalCloseBtn");
        fileInput.addEventListener("change", function() { if (this.files.length > 0) { const e = this.files[0].name; attachBtn.style.display = "none", fileLoader.style.display = "flex", fileSuccess.style.display = "none", fileStatus.textContent = "جاري التحميل...", setTimeout(() => { fileLoader.style.display = "none", fileSuccess.style.display = "flex", fileStatus.textContent = `تم تحميل: ${e}` }, 1500) } else attachBtn.style.display = "flex", fileLoader.style.display = "none", fileSuccess.style.display = "none", fileStatus.textContent = "" });
        function showModal(e, t) { modalTitle.textContent = e, modalBody.textContent = t, responseModal.classList.add("visible") }
        modalCloseBtn.addEventListener("click", () => { responseModal.classList.remove("visible") });
        submitBtn.addEventListener("click", async function(e) {
            e.preventDefault();
            const t = detailsInput.value.trim(), l = serviceSelect.value, n = langSelect.value, o = formatSelect.value, s = emailInput.value.trim();
            if (!t || !l || !n || !o || !s) return void(mainError.style.visibility = "visible");
            if (!/^\S+@\S+\.\S+$/.test(s)) return mainError.textContent = "الرجاء إدخال بريد إلكتروني صحيح.", void(mainError.style.visibility = "visible");
            mainError.style.visibility = "hidden", submitBtn.classList.add("loading"), submitBtn.textContent = "جاري المعالجة...", submitBtn.disabled = !0;
            const a = new FormData;
            a.append("details", t), a.append("service", l), a.append("lang", n), a.append("format", o), a.append("email", s), fileInput.files.length > 0 && a.append("attachment", fileInput.files[0]);
            try {
                const d = await fetch("https://smart-pen-ai.onrender.com/process-order", { method: "POST", body: a });
                const r = await d.json();
                if (d.ok) showModal("✅ تم بنجاح", r.message), orderForm.reset(), fileStatus.textContent = "", attachBtn.style.display = "flex", fileLoader.style.display = "none", fileSuccess.style.display = "none";
                else throw new Error(r.detail || "حدث خطأ غير متوقع.")
            } catch (i) { showModal("❌ حدث خطأ", "لا يمكن الوصول للخادم حالياً. الرجاء المحاولة لاحقاً."), console.error("Error:", i) } finally { submitBtn.classList.remove("loading"), submitBtn.textContent = "تأكيد الطلب", submitBtn.disabled = !1 }
        });
        document.querySelectorAll("select, textarea, input").forEach(e => { e.addEventListener("input", () => mainError.style.visibility = "hidden") });
    </script>
</body>
</html>
